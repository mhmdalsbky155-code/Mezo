<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>ميزو - النسخة الأسطورية</title>
    <style>
        body { background-color: #050505; margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        .face { background: #111; padding: 50px; border-radius: 60px; border: 2px solid #333; display: flex; gap: 40px; cursor: pointer; transition: 0.5s; position: relative; }
        .eye { width: 95px; height: 95px; background: #000; border-radius: 50%; border: 4px solid #00a2ff; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; transition: 0.3s; }
        .pupil { width: 38px; height: 38px; background: #00f2ff; border-radius: 50%; box-shadow: 0 0 25px #00a2ff; position: absolute; transition: 0.1s; }
        .status { margin-top: 30px; color: #00a2ff; font-size: 22px; text-align: center; max-width: 85%; line-height: 1.5; font-weight: bold; min-height: 1.5em; }
        video { display: none; }

        /* إضافات الإيد للعبة حجرة ورقة مقص */
        #hand-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 80px; display: none; z-index: 10; }

        /* --- التعابير المطورة --- */
        .face.happy .eye { border-radius: 50% 50% 15% 15%; border-color: #00ffaa; height: 65px; transform: translateY(10px); }
        .face.sad .eye { border-radius: 15% 15% 50% 50%; border-color: #3366ff; height: 85px; }
        .face.angry .eye { border-color: #ff3344; }
        .face.angry .eye:first-child { transform: rotate(-25deg) scaleY(0.7); }
        .face.angry .eye:last-child { transform: rotate(25deg) scaleY(0.7); }
        .face.surprised .eye { transform: scale(1.15); border-color: #ffffff; }
        .face.thinking .eye { border-color: #ffaa00; }
        
        /* حالة النوم 😴 */
        .face.sleepy { opacity: 0.4; transform: scale(0.9); }
        .face.sleepy .eye { height: 10px; border-radius: 0; border-color: #555; }
        .face.sleepy .pupil { display: none; }

        .face.listening { border-color: #ff00ff; box-shadow: 0 0 70px rgba(255, 0, 255, 0.5); }
        .face.standby { border-color: #222; opacity: 0.6; }
    </style>
</head>
<body>
    <video id="video" playsinline></video>
    <div class="face" id="bot">
        <div id="hand-overlay">✊</div>
        <div class="eye"><div class="pupil" id="l"></div></div>
        <div class="eye"><div class="pupil" id="r"></div></div>
    </div>
    <div id="msg" class="status">ناديني بـ "ميزو" عشان نبدأ الكلام</div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>

    <script>
        const API_KEYS = ["AIzaSyAWvcrCcmLobtW3zbkVL-krkVpdgNpzx4U"]; 
        let isThinking = false, isSessionActive = false, chatHistory = [], recognition, sendTimer, idleTimer;
        const msg = document.getElementById('msg'), faceDiv = document.getElementById('bot'), handOverlay = document.getElementById('hand-overlay');
        const pupils = [document.getElementById('l'), document.getElementById('r')], video = document.getElementById('video');

        function resetIdle() {
            clearTimeout(idleTimer);
            if (!isSessionActive) {
                idleTimer = setTimeout(() => {
                    faceDiv.className = "face sleepy";
                    msg.innerText = "شششش.. ميزو نام 😴";
                }, 30000); 
            }
        }

        function setEmotion(text) {
            faceDiv.className = "face"; 
            if (text.match(/😀|😃|😄|😁|😆|😅|🤣|😂|🙂|🙃|🫠|😉|😊|😇|🥰|😍|😋|🥲|😙|😚|☺️|😗|😘|🤩|😛|😜|🤪|😝|🤑|🤗|🤭|🫢|🫡/)) faceDiv.classList.add("happy");
            else if (text.match(/😔|😌|🫩|😴|😪|🙁|😟|🫤|😕|☹️|😣|😞|😓|😩|😫|🥱|🥺|🥹|😦|😭|😢|😥|😰|😨|😧/)) faceDiv.classList.add("sad");
            else if (text.match(/😲|😮|😯|😳|😱|🤯|🫨/)) faceDiv.classList.add("surprised");
            else if (text.match(/🤔|🤨|🫡|🤫|🫣|😶|🫥|😶‍🌫️|😏|😒|🙄|😬|🧐|🤓|😎|🥸/)) faceDiv.classList.add("thinking");
            else if (text.match(/😡|😠|🤬|😤/)) faceDiv.classList.add("angry");
            if (isSessionActive && !isThinking) faceDiv.classList.add("listening");
        }

        async function playGame() {
            isThinking = true;
            speak("ماشي يا معلم.. حجرة.. ورقة.. مقص!");
            let countdown = ["حجرة", "ورقة", "مقص"];
            for (let i = 0; i < 3; i++) {
                msg.innerText = countdown[i];
                await new Promise(r => setTimeout(r, 800));
            }
            const options = ["✊", "✋", "✌️"];
            const choice = options[Math.floor(Math.random() * options.length)];
            handOverlay.innerText = choice;
            handOverlay.style.display = "block";
            msg.innerText = "أنا لعبت " + (choice=="✊"?"حجرة":choice=="✋"?"ورقة":"مقص") + "!";
            setTimeout(() => { handOverlay.style.display = "none"; isThinking = false; startListening(); }, 3000);
        }

        async function startVision() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream; await video.play();
                const model = await blazeface.load();
                setInterval(async () => {
                    const predictions = await model.estimateFaces(video, false);
                    if (predictions.length > 0) {
                        const face = predictions[0].landmarks[2]; 
                        const x = (face[0] / video.videoWidth - 0.5) * 60;
                        const y = (face[1] / video.videoHeight - 0.5) * 60;
                        pupils.forEach(p => p.style.transform = `translate(${-x}px, ${y}px)`);
                    }
                }, 50);
            } catch (e) {}
        }

        async function askGemini(text) {
            resetIdle();
            if (text.match(/العب|حجرة ورقة مقص/)) { playGame(); return; }
            if (text.match(/خلاص|شكرا|اقفل|سلام/)) { isSessionActive = false; speak("سلام يا زميلي!"); return; }

            isThinking = true; faceDiv.className = "face thinking"; msg.innerText = "بفكر...";
            chatHistory.push({ role: "user", parts: [{ text: text }] });

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEYS[0]}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: chatHistory, 
                        systemInstruction: { parts: [{ text: "أنت ميزو، مساعد مصري روش. أنت تعلم أن لديك صوتاً ويمكنك الغناء أو التمثيل إذا طلب منك ذلك. أنت تحب اللعب والدردشة. استخدم الإيموجيات دائماً." }] } 
                    })
                });
                const data = await response.json();
                const reply = data.candidates[0].content.parts[0].text;
                chatHistory.push({ role: "model", parts: [{ text: reply }] });
                isThinking = false; setEmotion(reply); speak(reply);
            } catch (e) { isThinking = false; speak("في تهنيجة في السيرفر."); }
        }

        function speak(text) {
            const utter = new SpeechSynthesisUtterance(text.replace(/[\u{1F300}-\u{1F9FF}]/gu, ''));
            utter.lang = 'ar-EG';
            utter.onstart = () => { if(recognition) try{recognition.stop();}catch(e){} };
            utter.onend = () => { if (isSessionActive) { faceDiv.className = "face listening"; startListening(); } else { faceDiv.className = "face standby"; resetIdle(); startListening(); } };
            window.speechSynthesis.speak(utter);
            msg.innerText = text;
        }

        function startListening() {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRec(); recognition.lang = 'ar-EG'; recognition.continuous = true; recognition.interimResults = true;
            recognition.onresult = (e) => {
                let transcript = Array.from(e.results).map(r => r[0].transcript).join('').toLowerCase().trim();
                clearTimeout(sendTimer);
                if (transcript.includes("ميزو") || isSessionActive) {
                    sendTimer = setTimeout(() => { recognition.stop(); askGemini(transcript.replace("ميزو", "")); }, 1200);
                }
            };
            recognition.onend = () => { if (!isThinking && !window.speechSynthesis.speaking) recognition.start(); };
            recognition.start();
        }

        faceDiv.onclick = () => { if (window.speechSynthesis.speaking) window.speechSynthesis.cancel(); else isSessionActive = true; resetIdle(); };
        startVision(); resetIdle(); startListening();
    </script>
</body>
</html>
