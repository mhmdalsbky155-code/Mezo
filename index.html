<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>ميزو - النسخة المستقرة</title>
    <style>
        body { background-color: #050505; margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; justify-content: center; align-items: center; color: #00a2ff; font-size: 24px; cursor: pointer; text-align: center; }
        .face { background: #111; padding: 50px; border-radius: 60px; border: 2px solid #333; display: flex; gap: 40px; cursor: pointer; transition: 0.5s; position: relative; }
        .eye { width: 95px; height: 95px; background: #000; border-radius: 50%; border: 4px solid #00a2ff; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; transition: 0.2s; }
        .pupil { width: 38px; height: 38px; background: #00f2ff; border-radius: 50%; box-shadow: 0 0 25px #00a2ff; position: absolute; transition: 0.1s; }
        .status { margin-top: 30px; color: #00a2ff; font-size: 22px; text-align: center; max-width: 85%; line-height: 1.5; font-weight: bold; min-height: 1.5em; }
        video { display: none; }

        /* خضة ميزو */
        .face.scared { animation: shake 0.3s; border-color: #fff; box-shadow: 0 0 50px #fff; }
        .face.scared .eye { transform: scale(1.4); border-color: #fff; }
        @keyframes shake { 0% { left: -5px; } 50% { left: 5px; } 100% { left: 0; } }

        /* حالات الوش */
        .face.happy .eye { border-radius: 50% 50% 15% 15%; border-color: #00ffaa; height: 65px; transform: translateY(10px); }
        .face.thinking .eye { border-color: #ffaa00; }
        .face.sleepy { opacity: 0.3; }
        .face.sleepy .eye { height: 6px; border-radius: 2px; border-color: #444; margin-top: 30px; }
        .face.listening { border-color: #ff00ff; box-shadow: 0 0 70px rgba(255, 0, 255, 0.5); }
        
        #game-hand { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 100px; display: none; z-index: 2000; }
    </style>
</head>
<body>
    <div id="overlay">اضغط هنا لتفعيل ميزو (يا سبكي)</div>
    <video id="video" playsinline></video>
    <div class="face" id="bot">
        <div id="game-hand">✊</div>
        <div class="eye"><div class="pupil" id="l"></div></div>
        <div class="eye"><div class="pupil" id="r"></div></div>
    </div>
    <div id="msg" class="status">ميزو مستنيك تفعله..</div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>

    <script>
        const API_KEY = "AIzaSyAWvcrCcmLobtW3zbkVL-krkVpdgNpzx4U"; 
        let isThinking = false, isSessionActive = false, isSleeping = false, chatHistory = [], recognition;
        let idleTimer, sendTimer;

        const msg = document.getElementById('msg'), faceDiv = document.getElementById('bot'), gameHand = document.getElementById('game-hand');
        const pupils = [document.getElementById('l'), document.getElementById('r')], video = document.getElementById('video');

        document.getElementById('overlay').onclick = function() {
            this.style.display = 'none';
            isSessionActive = true;
            speak("أنا ميزو.. صاحي وجاهز يا زميلي!");
            startVision();
            startListening();
            resetIdleTimer();
        };

        function resetIdleTimer() {
            clearTimeout(idleTimer);
            if (!isThinking) {
                idleTimer = setTimeout(() => {
                    isSleeping = true;
                    isSessionActive = false;
                    faceDiv.className = "face sleepy";
                    msg.innerText = "ميزو نام.. صحيه لو محتاجه 😴";
                }, 40000);
            }
        }

        async function playRPS() {
            isThinking = true;
            speak("ماشي يا معلم.. حجرة.. ورقة.. مقص!");
            let steps = ["حجرة", "ورقة", "مقص"];
            for (let s of steps) {
                msg.innerText = s;
                await new Promise(r => setTimeout(r, 800));
            }
            const opts = ["✊", "✋", "✌️"];
            const choice = opts[Math.floor(Math.random() * opts.length)];
            gameHand.innerText = choice;
            gameHand.style.display = "block";
            setTimeout(() => { gameHand.style.display = "none"; isThinking = false; startListening(); }, 3000);
        }

        async function askGemini(text) {
            if (text.match(/العب|حجرة ورقة مقص/)) { playRPS(); return; }
            if (text.match(/خلاص|سلام|باي/)) { isSessionActive = false; speak("سلام يا صاحبي!"); return; }

            isThinking = true;
            faceDiv.className = "face thinking";
            msg.innerText = "بفكر...";
            chatHistory.push({ role: "user", parts: [{ text: text }] });

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: chatHistory,
                        systemInstruction: { parts: [{ text: "أنت ميزو، مساعد مصري روش. أنت تعلم أن لديك صوتاً ويمكنك الغناء واللعب. ردك دائماً مختصر وبالعامية وبإيموجي." }] }
                    })
                });
                const data = await response.json();
                const reply = data.candidates[0].content.parts[0].text;
                chatHistory.push({ role: "model", parts: [{ text: reply }] });
                isThinking = false;
                speak(reply);
            } catch (e) {
                isThinking = false;
                speak("الشبكة مهنجة شوية يا صاحبي، جرب تاني.");
            }
        }

        function speak(text) {
            msg.innerText = text;
            const utter = new SpeechSynthesisUtterance(text.replace(/[\u{1F300}-\u{1F9FF}]/gu, ''));
            utter.lang = 'ar-EG';
            utter.onstart = () => { if(recognition) try{recognition.stop();}catch(e){} };
            utter.onend = () => { 
                if (isSessionActive) {
                    faceDiv.className = "face listening";
                    startListening();
                } else {
                    faceDiv.className = "face standby";
                    startIdleTimer();
                    startListening();
                }
            };
            window.speechSynthesis.speak(utter);
        }

        function startListening() {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRec();
            recognition.lang = 'ar-EG';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onresult = (e) => {
                let transcript = Array.from(e.results).map(r => r[0].transcript).join('').toLowerCase().trim();
                
                // لو ناديت عليه وهو نايم
                if (isSleeping && (transcript.includes("ميزو") || transcript.includes("اصحى"))) {
                    isSleeping = false;
                    isSessionActive = true;
                    if (transcript.includes("اصحى")) {
                        faceDiv.className = "face scared";
                        speak("يا ساتر! خضتني يا زميلي.. معلش راحت عليا نومة!");
                    } else {
                        faceDiv.className = "face surprised";
                        speak("صباح الفل يا زميلي.. نورت!");
                    }
                    return;
                }

                // لو ميزو صاحي وبيسمع
                if (!isThinking && (isSessionActive || transcript.includes("ميزو"))) {
                    isSessionActive = true;
                    resetIdleTimer();
                    clearTimeout(sendTimer);
                    sendTimer = setTimeout(() => {
                        recognition.stop();
                        askGemini(transcript.replace("ميزو", ""));
                    }, 1500);
                }
            };
            recognition.onend = () => { if (!isThinking && !window.speechSynthesis.speaking) recognition.start(); };
            recognition.start();
        }

        async function startVision() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream; await video.play();
                const model = await blazeface.load();
                setInterval(async () => {
                    const predictions = await model.estimateFaces(video, false);
                    if (predictions.length > 0) {
                        const face = predictions[0].landmarks[2];
                        const x = (face[0] / video.videoWidth - 0.5) * 60;
                        const y = (face[1] / video.videoHeight - 0.5) * 60;
                        pupils.forEach(p => p.style.transform = `translate(${-x}px, ${y}px)`);
                    }
                }, 100);
            } catch (e) {}
        }

        faceDiv.onclick = () => { if (window.speechSynthesis.speaking) window.speechSynthesis.cancel(); else isSessionActive = true; resetIdleTimer(); };
    </script>
</body>
</html>
