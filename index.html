<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>ميزو - نسخة الخضة والولاء</title>
    <style>
        body { background-color: #050505; margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        .face { background: #111; padding: 50px; border-radius: 60px; border: 2px solid #333; display: flex; gap: 40px; cursor: pointer; transition: 0.5s; position: relative; }
        .eye { width: 95px; height: 95px; background: #000; border-radius: 50%; border: 4px solid #00a2ff; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; transition: 0.2s; }
        .pupil { width: 38px; height: 38px; background: #00f2ff; border-radius: 50%; box-shadow: 0 0 25px #00a2ff; position: absolute; transition: 0.1s; }
        .status { margin-top: 30px; color: #00a2ff; font-size: 22px; text-align: center; max-width: 85%; line-height: 1.5; font-weight: bold; min-height: 1.5em; }
        video { display: none; }

        /* --- وضع الخضة (Scared) --- */
        .face.scared { animation: shake 0.2s; border-color: #fff; box-shadow: 0 0 50px #fff; }
        .face.scared .eye { transform: scale(1.4); border-color: #fff; }
        @keyframes shake { 0% { left: -5px; } 50% { left: 5px; } 100% { left: 0; } }

        /* باقي التعابير */
        .face.happy .eye { border-radius: 50% 50% 15% 15%; border-color: #00ffaa; height: 65px; transform: translateY(10px); }
        .face.surprised .eye { transform: scale(1.2); border-color: #ffffff; }
        .face.sleepy { opacity: 0.3; }
        .face.sleepy .eye { height: 6px; border-radius: 2px; border-color: #444; margin-top: 30px; }
        .face.sleepy .pupil { display: none; }
        .face.listening { border-color: #ff00ff; box-shadow: 0 0 70px rgba(255, 0, 255, 0.5); }
    </style>
</head>
<body>
    <video id="video" playsinline></video>
    <div class="face" id="bot">
        <div class="eye"><div class="pupil" id="l"></div></div>
        <div class="eye"><div class="pupil" id="r"></div></div>
    </div>
    <div id="msg" class="status">ميزو مستنيك تلمحه..</div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>

    <script>
        const API_KEY = "AIzaSyAWvcrCcmLobtW3zbkVL-krkVpdgNpzx4U"; 
        let isThinking = false, isSessionActive = false, isSleeping = false, chatHistory = [], recognition, idleTimer;
        const msg = document.getElementById('msg'), faceDiv = document.getElementById('bot');
        const pupils = [document.getElementById('l'), document.getElementById('r')], video = document.getElementById('video');

        function startIdleTimer() {
            clearTimeout(idleTimer);
            if (!isSessionActive) {
                idleTimer = setTimeout(() => {
                    isSleeping = true;
                    faceDiv.className = "face sleepy";
                    msg.innerText = "شششش.. ميزو نام 😴";
                }, 30000); 
            }
        }

        function wakeUp(isShout = false) {
            if (isSleeping) {
                isSleeping = false;
                isSessionActive = true;
                if (isShout) {
                    faceDiv.className = "face scared";
                    speak("يا ساتر! خضتني يا زميلي.. معلش راحت عليا نومة!");
                } else {
                    faceDiv.className = "face surprised";
                    speak("صباح الفل يا زميلي.. نورت!");
                }
                return true;
            }
            return false;
        }

        async function startVision() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream; await video.play();
                const model = await blazeface.load();
                setInterval(async () => {
                    const predictions = await model.estimateFaces(video, false);
                    if (predictions.length > 0) {
                        const face = predictions[0].landmarks[2]; 
                        const x = (face[0] / video.videoWidth - 0.5) * 60;
                        const y = (face[1] / video.videoHeight - 0.5) * 60;
                        pupils.forEach(p => p.style.transform = `translate(${-x}px, ${y}px)`);
                    }
                }, 100);
            } catch (e) {}
        }

        async function askGemini(text) {
            isThinking = true;
            chatHistory.push({ role: "user", parts: [{ text: text }] });
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: chatHistory, 
                        systemInstruction: { parts: [{ text: "أنت ميزو، مساعد مصري روش. أنت تعلم أن لديك صوتاً ويمكنك الغناء. ردك دائماً مختصر وبالعامية المصرية وبإيموجي واحد." }] } 
                    })
                });
                const data = await response.json();
                const reply = data.candidates[0].content.parts[0].text;
                chatHistory.push({ role: "model", parts: [{ text: reply }] });
                isThinking = false;
                speak(reply);
            } catch (e) { isThinking = false; speak("في مشكلة في الشبكة."); }
        }

        function speak(text) {
            msg.innerText = text;
            const utter = new SpeechSynthesisUtterance(text.replace(/[\u{1F300}-\u{1F9FF}]/gu, ''));
            utter.lang = 'ar-EG';
            utter.onstart = () => { if(recognition) try{recognition.stop();}catch(e){} };
            utter.onend = () => { 
                if (isSessionActive) { faceDiv.className = "face listening"; startListening(); } 
                else { startIdleTimer(); startListening(); } 
            };
            window.speechSynthesis.speak(utter);
        }

        function startListening() {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRec();
            recognition.lang = 'ar-EG';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onresult = (e) => {
                let transcript = Array.from(e.results).map(r => r[0].transcript).join('').toLowerCase().trim();
                
                if (isSleeping && (transcript.includes("ميزو") || transcript.includes("اصحى"))) {
                    let shouted = transcript.includes("اصحى");
                    wakeUp(shouted);
                    return;
                }

                if (isSessionActive && !isThinking) {
                    clearTimeout(recognition.timer);
                    recognition.timer = setTimeout(() => {
                        recognition.stop();
                        askGemini(transcript);
                    }, 1200);
                }
            };
            recognition.onend = () => { if (!isThinking && !window.speechSynthesis.speaking) recognition.start(); };
            recognition.start();
        }

        faceDiv.onclick = () => { if (!wakeUp()) { isSessionActive = true; speak("أيوة يا زميلي سامعك!"); } };
        startVision(); startIdleTimer(); startListening();
    </script>
</body>
</html>
