<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>ميزو - وضع المحادثة المفتوحة</title>
    <style>
        body { background-color: #050505; margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        .face { background: #111; padding: 50px; border-radius: 60px; border: 2px solid #333; display: flex; gap: 40px; cursor: pointer; transition: 0.5s; position: relative; }
        .eye { width: 95px; height: 95px; background: #000; border-radius: 50%; border: 4px solid #00a2ff; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; transition: 0.3s; }
        .pupil { width: 38px; height: 38px; background: #00f2ff; border-radius: 50%; box-shadow: 0 0 25px #00a2ff; position: absolute; transition: 0.1s; }
        .status { margin-top: 30px; color: #00a2ff; font-size: 22px; text-align: center; max-width: 85%; line-height: 1.5; font-weight: bold; min-height: 1.5em; }
        video { display: none; }

        /* --- التعابير بناءً على القائمة الضخمة --- */
        .face.happy .eye { border-radius: 50% 50% 15% 15%; border-color: #00ffaa; height: 65px; transform: translateY(10px); }
        .face.happy .pupil { background: #00ffaa; box-shadow: 0 0 20px #00ffaa; }

        .face.sad .eye { border-radius: 15% 15% 50% 50%; border-color: #3366ff; height: 85px; }
        .face.sad .pupil { background: #3366ff; transform: translateY(15px); }

        .face.angry .eye { border-color: #ff3344; }
        .face.angry .eye:first-child { transform: rotate(-25deg) scaleY(0.7); }
        .face.angry .eye:last-child { transform: rotate(25deg) scaleY(0.7); }

        .face.surprised .eye { transform: scale(1.15); border-color: #ffffff; }
        .face.surprised .pupil { width: 45px; height: 45px; background: #fff; }

        .face.thinking .eye { border-color: #ffaa00; }
        .face.thinking .eye:first-child { transform: translateY(-15px); }

        .face.listening { border-color: #ff00ff; box-shadow: 0 0 70px rgba(255, 0, 255, 0.5); }
        .face.standby { border-color: #222; opacity: 0.6; }
    </style>
</head>
<body>
    <video id="video" playsinline></video>
    <div class="face" id="bot">
        <div class="eye"><div class="pupil" id="l"></div></div>
        <div class="eye"><div class="pupil" id="r"></div></div>
    </div>
    <div id="msg" class="status">ناديني بـ "ميزو" عشان نبدأ الكلام</div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>

    <script>
        const API_KEYS = ["AIzaSyAWvcrCcmLobtW3zbkVL-krkVpdgNpzx4U"]; // حط مفاتيحك هنا
        let isThinking = false;
        let isSessionActive = false;
        let chatHistory = [];
        let recognition;
        let sendTimer;

        const msg = document.getElementById('msg');
        const faceDiv = document.getElementById('bot');
        const pupils = [document.getElementById('l'), document.getElementById('r')];
        const video = document.getElementById('video');

        function setEmotion(text) {
            faceDiv.className = "face"; 
            // توزيع الإيموجيات الضخمة على الحالات
            if (text.match(/😀|😃|😄|😁|😆|😅|🤣|😂|🙂|🙃|🫠|😉|😊|😇|🥰|😍|😋|🥲|😙|😚|☺️|😗|😘|🤩|😛|😜|🤪|😝|🤑|🤗|🤭|🫢|🫡/)) faceDiv.classList.add("happy");
            else if (text.match(/😔|😌|🫩|😴|😪|🙁|😟|🫤|😕|☹️|😣|😞|😓|😩|😫|🥱|🥺|🥹|😦|😭|😢|😥|😰|😨|😧/)) faceDiv.classList.add("sad");
            else if (text.match(/😲|😮|😯|😳|😱|🤯|🫨/)) faceDiv.classList.add("surprised");
            else if (text.match(/🤔|🤨|🫡|🤫|🫣|😶|🫥|😶‍🌫️|😏|😒|🙄|😬|🧐|🤓|😎|🥸/)) faceDiv.classList.add("thinking");
            else if (text.match(/😡|😠|🤬|😤/)) faceDiv.classList.add("angry");
            if (isSessionActive && !isThinking) faceDiv.classList.add("listening");
        }

        async function startVision() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                await video.play();
                const model = await blazeface.load();
                setInterval(async () => {
                    const predictions = await model.estimateFaces(video, false);
                    if (predictions.length > 0) {
                        const face = predictions[0].landmarks[2]; 
                        const x = (face[0] / video.videoWidth - 0.5) * 60;
                        const y = (face[1] / video.videoHeight - 0.5) * 60;
                        pupils.forEach(p => p.style.transform = `translate(${-x}px, ${y}px)`);
                    }
                }, 50);
            } catch (e) {}
        }

        async function askGemini(text) {
            if (text.match(/خلاص|شكرا|اقفل|سلام|باي|كفاية/)) {
                isSessionActive = false;
                speak("ماشي يا زميلي، ناديني لو احتجتني.. سلام!");
                return;
            }

            isThinking = true;
            faceDiv.className = "face thinking";
            msg.innerText = "بفكر...";
            chatHistory.push({ role: "user", parts: [{ text: text }] });

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEYS[0]}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: chatHistory, 
                        systemInstruction: { parts: [{ text: "أنت ميزو، مساعد مصري روش وصاحب المستخدم. ردك طبيعي ومختصر. الذاكرة مفعلة. لازم تستخدم إيموجي واحد من القائمة الكبيرة لتعبر عن حالتك." }] } 
                    })
                });
                const data = await response.json();
                const reply = data.candidates[0].content.parts[0].text;
                chatHistory.push({ role: "model", parts: [{ text: reply }] });
                isThinking = false;
                setEmotion(reply);
                speak(reply);
            } catch (e) { isThinking = false; speak("في مشكلة في الشبكة يا زميلي."); }
        }

        function speak(text) {
            msg.innerText = text;
            const cleanText = text.replace(/[\u{1F300}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '');
            const utter = new SpeechSynthesisUtterance(cleanText);
            utter.lang = 'ar-EG';
            utter.onend = () => {
                if (isSessionActive) {
                    faceDiv.className = "face listening";
                    msg.innerText = "سامعك..";
                    startListening();
                } else {
                    faceDiv.className = "face standby";
                    msg.innerText = "ناديني بـ 'ميزو'";
                    startListening();
                }
            };
            window.speechSynthesis.speak(utter);
        }

        function startListening() {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRec();
            recognition.lang = 'ar-EG';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onresult = (e) => {
                let transcript = Array.from(e.results).map(r => r[0].transcript).join('').toLowerCase().trim();
                if (!isSessionActive) {
                    if (transcript.includes("ميزو")) {
                        isSessionActive = true;
                        let query = transcript.split("ميزو").pop().trim();
                        if (query.length > 1) {
                            clearTimeout(sendTimer);
                            sendTimer = setTimeout(() => { recognition.stop(); askGemini(query); }, 1200);
                        }
                    }
                } else {
                    let query = transcript;
                    if (query.includes("ميزو")) query = query.split("ميزو").pop().trim();
                    if (query.length > 1) {
                        clearTimeout(sendTimer);
                        sendTimer = setTimeout(() => { recognition.stop(); askGemini(query); }, 1200);
                    }
                }
            };
            recognition.onend = () => { if (!isThinking && !window.speechSynthesis.speaking) recognition.start(); };
            recognition.start();
        }

        faceDiv.onclick = () => {
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
                speak("سكت أهو، كمل كلامك؟");
            }
        };

        startVision();
        startListening();
    </script>
</body>
</html>
